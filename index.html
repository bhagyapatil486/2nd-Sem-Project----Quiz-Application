<!--Abhishek Part 1  -->









<!--Disha Part 2  -->
<div id="start-screen">
    <h1>Quiz Master</h1>

    <form id="start-form">
        <input
            type="text"
            id="username"
            placeholder="Enter your name"
        >

        <button type="submit">
            Start Quiz
        </button>
    </form>

    <p id="best-score"></p>
</div>


<!--Sahil Part 3  -->
<div id="quiz-screen" class="hidden">

    <p id="question-count"></p>

    <h2 id="question"></h2>



<!--Uttkarsh Part 4 -->

<div id="options"></div>

    <p id="feedback"></p>

    <p id="score">Score: 0</p>

    <button id="next-btn" class="hidden">
        Next
    </button>

</div>


<!--Alok Part 5  -->
    <div id="result-screen" class="hidden">

 <div class="report-card">

 <h2>Quiz Report Card</h2>

 <div class="score-circle">
     <span id="percentage-display">0%</span>
 </div>

 <div class="report-details">

     <div class="detail-box">
         <h3 id="correct-count">0</h3>
         <p>Correct</p>
     </div>

     <div class="detail-box">
         <h3 id="wrong-count">0</h3>
         <p>Wrong</p>
     </div>

     <div class="detail-box">
         <h3 id="final-score">0/0</h3>
         <p>Score</p>
     </div>

 </div>


<!--Bhagyashree Part 6  -->
<div id="result"></div>

        <button onclick="location.reload()">
            Attempt Again
        </button>

    </div>

</div>
    <script src="script.js"></script>

</body>
</html>
